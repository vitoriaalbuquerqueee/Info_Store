# Configuracoes do Servidor
server.port=8080

# Conexao com o Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_infostore?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Criacao e atualizacao automatica das tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar Open In View (boa pratica)
spring.jpa.open-in-view=false
